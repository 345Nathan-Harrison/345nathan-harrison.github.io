<!doctype html>
<html lang="en" translate="no" class="notranslate">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Language" content="en" />
    <meta name="google" content="notranslate" />
    <title>Page Not Found</title>
    <link rel="icon" href="img/favicon.ico" sizes="any" />
    <script>
      (function () {
        var path = window.location.pathname;
        var lower = path.toLowerCase();

        if (path !== lower) {
          window.location.replace(
            lower + window.location.search + window.location.hash,
          );
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      .theme-toggle-row {
        justify-content: flex-end;
        margin-bottom: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="hero">
        <span class="hero-badge">404 - Page Not Found</span>
        <h1>This page does not exist</h1>
        <p class="hero-subtitle">
          The link may be outdated, the URL may be mistyped, or the page may
          have moved.
        </p>
        <div class="hero-cta">
          <a href="./index.html" class="btn btn-primary">Return Home</a>
          <!-- <a href="step.html?step=00-overview" class="btn btn-secondary"
            >Open Workshop Overview</a
          > -->
        </div>
      </section>
    </div>
  </body>
</html>
